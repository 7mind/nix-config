\* TLC model checking configuration for Heating.
\*
\* Run with:
\*   nix-shell -p tlaplus --run "tlc -workers auto HMC"

SPECIFICATION Spec

\* ---- Model values ----
CONSTANTS
    mc_hz1  = mc_hz1
    mc_hz2  = mc_hz2
    mc_ht1  = mc_ht1
    mc_ht2  = mc_ht2
    mc_ht3  = mc_ht3
    mc_NIL  = mc_NIL

\* ---- Constant overrides ----
CONSTANTS
    HZones         <- MC_HZones
    TRVs           <- MC_TRVs
    TrvZone        <- MC_TrvZone
    PressureGroups <- MC_PressureGroups
    MinCycle       <- MC_MinCycle
    MinPause       <- MC_MinPause
    MaxTime        <- MC_MaxTime
    NIL            <- MC_NIL

\* ---- State invariants (8) ----
INVARIANT TypeOK
INVARIANT PumpOnConsistent
INVARIANT RelayAtConsistent
INVARIANT PumpMutuallyExclusive
INVARIANT PumpOnInPast
INVARIANT PumpOffInPast
INVARIANT RelayAtInPast
INVARIANT ForcedImpliesGroupMember

\* ---- Action properties (4) ----
PROPERTY MinPauseRespectedProp
PROPERTY MinCycleRespectedProp
PROPERTY RelayOnStampsTimeProp
PROPERTY RelayOffClearsTimeProp
