\* TLC model checking configuration for HueController.
\*
\* Run with:
\*   nix-shell -p tlaplus --run "tlc -workers auto MC"
\*
\* Or with the TLA+ Toolbox / VS Code TLA+ extension.

SPECIFICATION Spec

\* ---- Model values ----
CONSTANTS
    mc_r_parent = mc_r_parent
    mc_r_child  = mc_r_child
    mc_s1       = mc_s1
    mc_s2       = mc_s2
    mc_s3       = mc_s3
    mc_p1       = mc_p1
    mc_NIL      = mc_NIL

\* ---- Constant overrides (point to MC module definitions) ----
CONSTANTS
    Rooms        <- MC_Rooms
    Sensors      <- MC_Sensors
    NumScenes    <- MC_NumScenes
    Parent       <- MC_Parent
    Cooldown     <- MC_Cooldown
    HasLuxGate   <- MC_HasLuxGate
    CycleWindow  <- MC_CycleWindow
    RoomHasSwitch <- MC_RoomHasSwitch
    RoomHasTap   <- MC_RoomHasTap
    Plugs        <- MC_Plugs
    KillHoldoff  <- MC_KillHoldoff
    MaxTime      <- MC_MaxTime
    NIL          <- MC_NIL

\* ---- State invariants (10) ----
INVARIANT TypeOK
INVARIANT MotionOwnershipConsistent
INVARIANT CycleIdxValid
INVARIANT PlugIdleOnlyWhenOn
INVARIANT MotionAlwaysPossibleWhenOff
INVARIANT OffImpliesCycleReset
INVARIANT NilPressOnImpliesCycleZero
INVARIANT LoaInPast
INVARIANT LpaInPast
INVARIANT PidleInPast
INVARIANT CooldownBlocksMotion
INVARIANT MotionOwnedImpliesSensorHistory

\* ---- Action properties (6) ----
PROPERTY OffAlwaysStampsLoaProp
PROPERTY OffAlwaysResetsCycleProp
PROPERTY OffAlwaysClearsMotionProp
PROPERTY UserPressClearsMotionProp
PROPERTY PlugToggleClearsIdleProp
PROPERTY OnNeverStampsLoaProp

