\* TLC model checking configuration for TassPlug.
\*
\* Run with:
\*   nix-shell -p tlaplus --run "tlc -workers auto PMC"
\*
\* Or with the TLA+ Toolbox / VS Code TLA+ extension.

SPECIFICATION Spec

\* ---- Model values ----
CONSTANTS
    mc_NIL = mc_NIL

\* ---- Constant overrides (point to PMC module definitions) ----
CONSTANTS
    KillThreshold <- MC_KillThreshold
    KillHoldoff   <- MC_KillHoldoff
    MaxPower      <- MC_MaxPower
    MaxTime       <- MC_MaxTime
    NIL           <- MC_NIL

\* ---- State invariants ----
INVARIANT TypeOK
INVARIANT IdleOnlyWhenOn
INVARIANT IdleSinceValid
INVARIANT ConfirmedImpliesMatch
INVARIANT UnsetConsistent
INVARIANT IdleSinceInPast
INVARIANT KillSwitchRequiresOn

\* ---- Action properties ----
PROPERTY KillSwitchRespectsHoldoffProp
PROPERTY OffClearsKillSwitchProp
PROPERTY OffResetsTargetProp
