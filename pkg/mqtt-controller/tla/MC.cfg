\* TLC model checking configuration for TassLightZone.
\*
\* Run with:
\*   nix-shell -p tlaplus --run "tlc -workers auto MC"
\*
\* Or with the TLA+ Toolbox / VS Code TLA+ extension.

SPECIFICATION Spec

\* ---- Model values ----
CONSTANTS
    mc_NIL = mc_NIL

\* ---- Constant overrides (point to MC module definitions) ----
CONSTANTS
    CycleWindow <- MC_CycleWindow
    Cooldown    <- MC_Cooldown
    HasMotion   <- MC_HasMotion
    MaxTime     <- MC_MaxTime
    NIL         <- MC_NIL

\* ---- State invariants ----
INVARIANT TypeOK
INVARIANT TargetPhaseValid
INVARIANT ConfirmedImpliesMatch
INVARIANT MotionOwnerConsistent
INVARIANT FreshnessValid
INVARIANT LastPressInPast
INVARIANT LastOffInPast
INVARIANT CooldownBlocksMotion

\* ---- Action properties ----
PROPERTY OffResetsOwnerProp
PROPERTY OffStampsLastOffProp
PROPERTY UserPressClearsMotionProp
